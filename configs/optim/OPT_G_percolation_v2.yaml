# OPT-G v2: LFD + Lacunarity + Percolation — clDice-optimized (300 epochs)
# Purpose: Full fractal prior stack with topology-aware losses.
# Key changes: all 3 fractal priors + clDice(0.35) + skel_recall(0.15)
# + 10-epoch warmup + clDice-based checkpoint selection
seed: 42
model:
  name: fractal_prior
  in_channels: 3
  embed_dim: 32
  depths: [1, 1, 1]
  enable_fractal_gate: false
  alpha: 1.0
  prior_fusion:
    enabled: false
  prior_channels: 1
  fractal_spade:
    enabled: false
  fractal_diffusion_spade:
    enabled: true
    n_steps: 5
    prior_channels: 5            # [LFD, PDE_enhanced, PDE_edge, lacunarity, percolation]
    hidden_dim: 32
    use_hessian_direction: false
  freq_geom:
    enabled: false

train:
  epochs: 300
  steps_per_epoch: 400
  batch_size: 1
  lr: 0.0003
  weight_decay: 0.01
  amp: true
  grad_clip_norm: 1.0
  checkpoint_best_metric: cldice  # ← Save best checkpoint by clDice, not Dice
  scheduler:
    type: cosine
    eta_min: 1e-6
    warmup_epochs: 10            # ← Linear warmup to protect PDE params
  save_every_epochs: 25
  full_eval_every_epochs: 25     # ← 300/25 = 12 evals
  full_eval_max_samples: 10      # ← More images for reliable checkpoint selection

data:
  dataset: hrf
  dataset_root: "/home/lucian/medical-imaging-ai/Retina Datasets/Full retina dataset/FIVES"
  manifest_path: manifests/fives.jsonl
  split:
    mode: sample
    seed: 123
    ratios: { train: 0.8, val: 0.1, test: 0.1 }
  patch_size: [384, 384]
  patch_sampling:
    enabled: true
    mode: vessel_aware
    p_vessel: 0.7
    p_background: 0.3
    vessel_buffer: 3
    background_buffer: 2
  return_fov: false
  photometric_aug:
    enabled: true
    brightness: 0.12             # ← Slightly stronger for 300 epochs
    contrast: 0.20
    gamma: 0.15
  return_fractal_prior: true

eval:
  full_image: true
  threshold:
    default: 0.5
    use_tau_star_if_available: true
  threshold_sweep:
    enabled: true
    grid: [0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9]
  fov:
    enabled: false

infer:
  mode: tiled
  tiled:
    patch_size: [384, 384]
    stride: [192, 192]
    pad_mode: reflect
    blend: hann
    batch_tiles: 2
    eps: 1e-6

loss:
  focal:
    enabled: true
    weight: 0.1
  cldice:
    enabled: true
    weight: 0.35                 # Higher weight for topology
    iter: 15                     # ← Better skeleton approx (was 10)
  skeleton_recall:
    enabled: true
    weight: 0.15                 # Penalizes missing thin vessels

fractal_prior:
  enabled: true
  include_lacunarity: true
  include_percolation: true      # ← Full fractal stack

wandb:
  enabled: true
  project: fractal-swin-unet
  tags: ["OPT-G", "percolation", "lacunarity", "clDice-optimized", "300ep"]
