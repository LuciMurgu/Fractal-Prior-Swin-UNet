# Eval config for best-ever checkpoint (hrf_diag_base_40, Dice 0.795)
# WITH TTA (D4 group: 8 augmentations) + post-processing
# Usage: python -m fractal_swin_unet.eval --config configs/hrf_best_tta_eval.yaml

seed: 42
model:
  name: fractal_prior
  in_channels: 3
  embed_dim: 32
  depths: [1, 1, 1]
  enable_fractal_gate: true
  alpha: 1.0
  prior_fusion:
    enabled: false

data:
  dataset: hrf
  dataset_root: "/home/lucian/medical-imaging-ai/Retina Datasets/Full retina dataset/HRF"
  manifest_path: "manifests/hrf_full.jsonl"
  split:
    mode: sample
    seed: 123
    ratios:
      train: 0.6
      val: 0.2
      test: 0.2
  patch_size: [384, 384]
  return_fov: true
  return_fractal_prior: false

eval:
  checkpoint_path: runs/hrf_diag_base_40/checkpoint_best.pt
  full_image: true
  threshold:
    default: 0.5
    use_tau_star_if_available: true
  threshold_sweep:
    enabled: true
    grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
  fov:
    enabled: true
    key: fov_mask_path
    ignore_outside: true
  # TTA: D4 group (8 augmentations)
  tta:
    enabled: true
    scales: [1.0]
  # Post-processing
  postprocess:
    enabled: true
    min_component_size: 50
    morphological_close_radius: 2

infer:
  mode: tiled
  tiled:
    patch_size: [384, 384]
    stride: [192, 192]
    pad_mode: reflect
    blend: hann
    batch_tiles: 4
    eps: 1e-6

fractal_prior:
  enabled: false
