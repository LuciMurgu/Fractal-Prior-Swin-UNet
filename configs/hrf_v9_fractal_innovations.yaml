# V9 Fractal Innovations — Full HRF training config
# New features: multi-scale FFM, cbDice, skeleton recall, fractal-weighted BCE,
# multi-decoder (edge + skeleton), FD regression head.
# GPU-only. Do NOT pass --use_synth_data.

seed: 42
model:
  name: fractal_prior
  in_channels: 3
  embed_dim: 48
  depths: [2, 2, 4]
  drop_rate: 0.1
  enable_fractal_gate: true
  alpha: 1.0
  prior_fusion:
    enabled: true
  prior_channels: 4  # 3 LFD scales + 1 lacunarity
  multi_decoder:
    enabled: true
  fd_regression:
    enabled: true
  freq_geom:  # FGOS-Net 2026 — Haar DWT frequency-geometric decomposition
    enabled: true

train:
  epochs: 80
  steps_per_epoch: 220
  batch_size: 1
  accumulate_grad_steps: 4
  lr: 0.0005
  weight_decay: 0.01
  grad_clip_norm: 1.0
  scheduler:
    type: cosine
    eta_min: 1e-6
  out_dir: runs/hrf_full
  checkpoint_path: runs/hrf_full/checkpoint.pt
  save_every_epochs: 10
  full_eval_every_epochs: 10
  full_eval_max_samples: 0
  amp: true

data:
  dataset: hrf
  dataset_root: "/home/lucian/medical-imaging-ai/Retina Datasets/Full retina dataset/HRF"
  manifest_path: "manifests/hrf_full.jsonl"
  split:
    mode: sample
    seed: 123
    ratios:
      train: 0.6
      val: 0.2
      test: 0.2
  patch_size: [384, 384]
  patch_sampling:
    enabled: true
    mode: vessel_aware
    p_vessel: 0.7
    p_background: 0.3
    vessel_buffer: 3
    background_buffer: 2
    fractal_hard:
      enabled: false
  return_fov: true
  photometric_aug:
    enabled: true
    brightness: 0.08
    contrast: 0.15
    gamma: 0.15
    spatial:
      elastic:
        enabled: true
        alpha: 20.0
        sigma: 6.0
        p: 0.4
      scale:
        enabled: true
        scale_range: [0.85, 1.15]
        p: 0.3
      gaussian_noise:
        enabled: true
        std: 0.015
        p: 0.3
  clahe:
    enabled: true
    clip_limit: 2.0
    tile_grid_size: 8
  return_fractal_prior: true
  # Multi-scale FFM config (Phase 1)
  multiscale_ffm:
    enabled: true
    window_sizes: [16, 32, 64]
    include_lacunarity: true

eval:
  checkpoint_path: runs/hrf_full/checkpoint.pt
  full_image: true
  threshold:
    default: 0.5
    use_tau_star_if_available: true
  threshold_sweep:
    enabled: true
    grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
  fov:
    enabled: true
    key: fov_mask_path
    ignore_outside: true

infer:
  mode: tiled
  save_probs: true
  save_overlay: false
  out_subdir: preds
  tiled:
    patch_size: [384, 384]
    stride: [192, 192]
    pad_mode: reflect
    blend: hann
    batch_tiles: 4
    eps: 1e-6

loss:
  from_logits: true
  dice:
    enabled: true
    weight: 1.0
  bce:
    enabled: true
    weight: 1.0
    pos_weight: 20.0
  focal:
    enabled: true
    weight: 0.1
  # Replace clDice with cbDice (diameter-aware)
  cldice:
    enabled: false
  cbdice:
    enabled: true
    weight: 0.15
    iter: 10
  # Skeleton recall for topology preservation
  skeleton_recall:
    enabled: true
    weight: 0.1
    iter: 10
  # Fractal-weighted BCE (FFM attention in loss)
  fractal_bce:
    enabled: true
    weight: 0.5
    alpha: 1.0
    pos_weight: 20.0
  # Auxiliary decoder losses (auto-computed from mask)
  edge_aux:
    enabled: true
    weight: 0.5
  skeleton_aux:
    enabled: true
    weight: 0.5

fractal_prior:
  enabled: true
  multi_scale:
    enabled: true
    factors: [1, 2, 4]
    include_lacunarity: true
