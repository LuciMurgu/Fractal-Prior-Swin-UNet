seed: 42
model:
  name: fractal_prior
  in_channels: 3
  embed_dim: 16
  depths: [1, 1, 1]
  enable_fractal_gate: true
  alpha: 1.0
train:
  epochs: 1
  steps_per_epoch: 2
  batch_size: 2
  lr: 0.001
  out_dir: runs/smoke
  checkpoint_path: runs/smoke/checkpoint.pt
data:
  image_size: 128
  full_image_size: 160
  patch_size: 96
  synth:
    num_samples: 2
  split:
    mode: sample
    seed: 42
    locked: false
    allow_leakage: false
    ratios:
      train: 0.6
      val: 0.2
      test: 0.2
eval:
  checkpoint_path: runs/smoke/checkpoint.pt
  full_image: true
  threshold:
    default: 0.5
    use_tau_star_if_available: false
  threshold_sweep:
    enabled: true
    grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
  fov:
    enabled: false
    key: fov_mask_path
    mode: mask
    ignore_outside: true
infer:
  mode: tiled
  save_probs: true
  save_overlay: false
  out_subdir: preds
  tiled:
    patch_size: [64, 64]
    stride: [32, 32]
    pad_mode: reflect
    blend: hann
    batch_tiles: 8
    eps: 1e-6
