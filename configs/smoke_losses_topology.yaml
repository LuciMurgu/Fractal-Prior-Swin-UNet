seed: 42
model:
  name: fractal_prior
  in_channels: 3
  embed_dim: 16
  depths: [1, 1, 1]
  enable_fractal_gate: true
  alpha: 1.0
train:
  epochs: 1
  steps_per_epoch: 2
  batch_size: 2
  lr: 0.001
  out_dir: runs/smoke
  checkpoint_path: runs/smoke/checkpoint.pt
data:
  image_size: 128
  patch_size: 96
  synth:
    num_samples: 6
  split:
    mode: sample
    seed: 42
    locked: false
    allow_leakage: false
    ratios:
      train: 0.6
      val: 0.2
      test: 0.2
eval:
  checkpoint_path: runs/smoke/checkpoint.pt
  threshold:
    default: 0.5
  threshold_sweep:
    enabled: true
    grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
loss:
  from_logits: true
  dice:
    enabled: true
    weight: 1.0
    smooth: 1.0
  bce:
    enabled: true
    weight: 1.0
    pos_weight: null
  focal:
    enabled: true
    weight: 0.25
    alpha: 0.25
    gamma: 2.0
    reduction: mean
  cldice:
    enabled: true
    weight: 0.5
    iter: 10
    smooth: 1.0
    eps: 1e-6
