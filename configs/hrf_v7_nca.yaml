# Full HRF training with V7 Fractal NCA
# Phase A (0-50): Train U-Net backbone, NCA frozen
# Phase B (51-150): NCA unfrozen, Train both

seed: 42
model:
  name: fractal_prior
  in_channels: 3
  embed_dim: 32
  depths: [1, 1, 1]
  enable_fractal_gate: true
  alpha: 1.0
  prior_fusion:
    enabled: true
  nca:
    enabled: true
    hidden: 32
    steps: 16
    stochastic_rate: 0.5

train:
  epochs: 150
  steps_per_epoch: 220
  batch_size: 2
  lr: 0.0005
  out_dir: runs/hrf_v7_nca
  checkpoint_path: runs/hrf_v7_nca/checkpoint.pt
  save_every_epochs: 10
  full_eval_every_epochs: 10
  full_eval_max_samples: 0
  nca_freeze_until_epoch: 50

data:
  dataset: hrf
  dataset_root: "/home/lucian/medical-imaging-ai/Retina Datasets/Full retina dataset/HRF"
  manifest_path: "manifests/hrf_full.jsonl"
  split:
    mode: sample
    seed: 123
    ratios:
      train: 0.6
      val: 0.2
      test: 0.2
  patch_size: [384, 384]
  patch_sampling:
    enabled: true
    mode: vessel_aware
    p_vessel: 0.7
    p_background: 0.3
    vessel_buffer: 3
    background_buffer: 2
    fractal_hard:
      enabled: false
  return_fov: true
  photometric_aug:
    enabled: true
    brightness: 0.08
    contrast: 0.15
    gamma: 0.15
  return_fractal_prior: true

eval:
  checkpoint_path: runs/hrf_v7_nca/checkpoint.pt
  full_image: true
  threshold:
    default: 0.5
    use_tau_star_if_available: true
  threshold_sweep:
    enabled: true
    grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
  fov:
    enabled: true
    key: fov_mask_path
    ignore_outside: true

infer:
  mode: tiled
  save_probs: true
  save_overlay: false
  out_subdir: preds
  tiled:
    patch_size: [384, 384]
    stride: [192, 192]
    pad_mode: reflect
    blend: hann
    batch_tiles: 4
    eps: 1e-6

loss:
  from_logits: true
  dice:
    enabled: true
    weight: 1.0
  bce:
    enabled: true
    weight: 1.0
    pos_weight: 50.0  # Nuclear Option from V6
  focal:
    enabled: true
    weight: 0.1
  cldice:
    enabled: true
    weight: 0.12
    iter: 10

fractal_prior:
  enabled: true
  multi_scale:
    enabled: true
    factors: [1, 2, 4]
